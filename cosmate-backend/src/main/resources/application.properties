spring.application.name=CosMate
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver
spring.profiles.active=dev

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:sqlserver://localhost:1433;encrypt=true;trustServerCertificate=true;databaseName=CosMate}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect

spring.jpa.hibernate.ddl-auto=validate

jwt.secret=${JWT_SECRET:}

# Google client ID used to validate id_tokens from frontend Google Identity Services
# Set this to the Client ID you obtain in Google Cloud Console (OAuth 2.0 Client IDs)
google.client-id=${GOOGLE_CLIENT_ID:}

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

#spring.web.cors.allowed-origins=http://localhost:8080
#spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
#spring.web.cors.allowed-headers=*
#spring.web.cors.allow-credentials=true


server.port=${PORT:8080}
#mail
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=${SPRING_MAIL_SSL_TRUST:smtp.gmail.com}

spring.servlet.multipart.enabled=true
# Gioi han 5MB cho 1 file don le
spring.servlet.multipart.max-file-size=5MB
# Gioi han 50MB cho tong 1 lan request (10 file x 5MB)
spring.servlet.multipart.max-request-size=50MB

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Enable debug logging for JWT filter and application packages to help diagnose authorization issues
logging.level.com.cosmate.security=DEBUG
logging.level.com.cosmate=DEBUG

# Firebase properties
# Service account JSON file (keep this file out of git in production)
firebase.service-account-file=${FIREBASE_SERVICE_ACCOUNT_FILE:cosmate-firebase.json}
# Bucket name to use with Firebase Storage - using the user's provided hostname
firebase.bucket-name=${FIREBASE_BUCKET_NAME:cosmatemoe-9ea85.firebasestorage.app}

# Backward-compatible property (some code still used firebase.bucket)
firebase.bucket=${FIREBASE_BUCKET:cosmatemoe-9ea85.appspot.com}

# VNPay properties
vnp.tmnCode=${VNP_TMN_CODE:}
vnp.hashSecret=${VNP_HASH_SECRET:}
vnp.url=${VNP_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}

# Momo properties (DEV/PROD can be overridden via environment)
momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api}
momo.accessKey=${MOMO_ACCESS_KEY:}
momo.partnerCode=${MOMO_PARTNER_CODE:}
momo.secretKey=${MOMO_SECRET_KEY:}

# Google Gemini API Key cho cac chuc nang AI (Search, Recommend, Check 18+, Pose Score)
# Google Gemini API Key cho cac chuc nang AI (Search, Recommend, Check 18+, Pose Score)
gemini.api.key=${GEMINI_API_KEY:}
# 1. Link danh cho AI Kiem duyet
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent

# Frontend URL used by server to redirect after payment returns
frontend.url=http://localhost:5173

# Backend base URL used to construct activation link (backend will handle activation and redirect to frontend)
backend.url=http://localhost:8080
